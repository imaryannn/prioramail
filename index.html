<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prioramail - Smart Email Client</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <!-- Login Screen -->
        <div id="login-screen" class="screen active">
            <div class="login-container">
                <h1 class="logo"><span class="logo-priora">Priora</span><span class="logo-mail">mail</span></h1>
                <p class="tagline">Focus on what matters</p>
                <button id="google-login-btn" class="btn-primary">
                    <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                        <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z" fill="#4285F4"/>
                        <path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z" fill="#34A853"/>
                        <path d="M3.964 10.707c-.18-.54-.282-1.117-.282-1.707 0-.593.102-1.17.282-1.709V4.958H.957C.347 6.173 0 7.548 0 9c0 1.452.348 2.827.957 4.042l3.007-2.335z" fill="#FBBC05"/>
                        <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
                    </svg>
                    Continue with Google
                </button>
            </div>
        </div>

        <!-- Main App -->
        <div id="main-screen" class="screen">
            <!-- Sidebar -->
            <aside class="sidebar">
                <h2 class="logo-small"><span class="logo-priora">Priora</span><span class="logo-mail">mail</span></h2>
                <button class="btn-compose">+ Compose</button>
                <nav class="nav">
                    <a href="#" class="nav-item active" data-view="inbox">
                        <span class="nav-icon">📥</span>
                        <span>Inbox</span>
                    </a>
                    <a href="#" class="nav-item" data-view="sent">
                        <span class="nav-icon">📤</span>
                        <span>Sent</span>
                    </a>
                </nav>
                <div class="user-info">
                    <img id="user-avatar" src="" alt="User" class="avatar">
                    <span id="user-email" class="user-email"></span>
                </div>
            </aside>

            <!-- Main Content -->
            <main class="main-content">
                <!-- Priority Tabs -->
                <div class="priority-tabs">
                    <button class="tab active" data-priority="focus">🔴 Focus</button>
                    <button class="tab" data-priority="later">🟡 Later</button>
                    <button class="tab" data-priority="ignore">⚪ Other</button>
                </div>

                <!-- Email List -->
                <div id="email-list" class="email-list">
                    <!-- Emails will be injected here -->
                </div>

                <!-- Email View -->
                <div id="email-view" class="email-view hidden">
                    <button class="btn-back">← Back</button>
                    <div class="email-header">
                        <h2 id="email-subject"></h2>
                        <div class="email-meta">
                            <img id="sender-avatar" src="" alt="" class="avatar-small">
                            <div>
                                <div id="sender-name" class="sender-name"></div>
                                <div id="sender-email" class="sender-email"></div>
                            </div>
                            <span id="email-date" class="email-date"></span>
                        </div>
                    </div>
                    <div id="email-body" class="email-body"></div>
                </div>
            </main>
        </div>

        <!-- Compose Modal -->
        <div id="compose-modal" class="modal hidden">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>New Message</h3>
                    <button class="btn-close">×</button>
                </div>
                <form id="compose-form">
                    <input type="email" id="compose-to" placeholder="To" required>
                    <input type="text" id="compose-subject" placeholder="Subject">
                    <textarea id="compose-body" placeholder="Message" rows="12"></textarea>
                    <div class="modal-actions">
                        <button type="submit" class="btn-primary">Send</button>
                        <button type="button" class="btn-secondary btn-cancel">Cancel</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
